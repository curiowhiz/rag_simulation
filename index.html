<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAG Simulator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family: Inter, Arial, sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:30px;
}

.container{
max-width:1100px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

textarea,input{
width:100%;
padding:10px;
border-radius:6px;
border:none;
margin-top:8px;
background:#334155;
color:white;
}

button{
margin-top:10px;
padding:10px 15px;
border:none;
border-radius:6px;
background:#6366f1;
color:white;
cursor:pointer;
}

button:hover{
background:#4f46e5;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.step{
background:#020617;
padding:15px;
border-radius:8px;
margin-top:10px;
font-size:14px;
}

.chunk{
background:#334155;
padding:8px;
margin:5px 0;
border-radius:6px;
}

.highlight{
background:#22c55e;
}

.answer{
background:#065f46;
padding:10px;
border-radius:8px;
margin-top:10px;
}

.small{
font-size:12px;
opacity:0.7;
}
</style>
</head>

<body>

<div class="container">

<h1>RAG (Retrieval Augmented Generation) Simulator</h1>

<div class="card">
<label>Paste Knowledge Base Document</label>
<textarea id="document" rows="6">
RAG stands for Retrieval Augmented Generation. It improves LLM answers by retrieving relevant documents. Vector databases store embeddings of document chunks. Similarity search finds relevant context.
</textarea>

<button onclick="processDocs()">Process Documents</button>

<div id="chunks" class="step"></div>
<div id="vectors" class="step"></div>
</div>

<div class="card">
<label>User Query</label>
<input id="query" value="What does RAG do?">

<button onclick="runQuery()">Run RAG Pipeline</button>

<div id="queryEmbedding" class="step"></div>
<div id="retrieval" class="step"></div>
<div id="context" class="step"></div>
<div id="answer" class="answer"></div>

</div>

</div>

<script>

let vectorDB=[]

function chunkText(text){
return text.match(/[^\.!\?]+[\.!\?]+/g) || [text]
}

function createEmbedding(text){
let vec=[]
for(let i=0;i<10;i++){
vec.push((text.charCodeAt(i%text.length)||0)/255)
}
return vec
}

function cosine(a,b){

let dot=0
let normA=0
let normB=0

for(let i=0;i<a.length;i++){
dot+=a[i]*b[i]
normA+=a[i]*a[i]
normB+=b[i]*b[i]
}

return dot/(Math.sqrt(normA)*Math.sqrt(normB))
}

function processDocs(){

let text=document.getElementById("document").value

let chunks=chunkText(text)

vectorDB=[]

let chunkHTML="<b>Step 1: Document Chunking</b><br>"

chunks.forEach((c,i)=>{
chunkHTML+=`<div class='chunk'>Chunk ${i+1}: ${c}</div>`

let emb=createEmbedding(c)

vectorDB.push({
text:c,
embedding:emb
})

})

document.getElementById("chunks").innerHTML=chunkHTML

let vecHTML="<b>Step 2–3: Embeddings Stored in Vector DB</b><br>"

vectorDB.forEach((v,i)=>{
vecHTML+=`<div class='small'>Chunk ${i+1} Vector: [${v.embedding.map(n=>n.toFixed(2)).join(", ")}]</div>`
})

document.getElementById("vectors").innerHTML=vecHTML

}

function runQuery(){

let query=document.getElementById("query").value

let qEmbed=createEmbedding(query)

document.getElementById("queryEmbedding").innerHTML=
"<b>Step 4: Query Embedding</b><br>"+JSON.stringify(qEmbed.map(n=>n.toFixed(2)))

let scored=[]

vectorDB.forEach(v=>{
let score=cosine(qEmbed,v.embedding)
scored.push({
text:v.text,
score:score
})
})

scored.sort((a,b)=>b.score-a.score)

let retrievalHTML="<b>Step 5: Similarity Search</b><br>"

scored.forEach((r,i)=>{
retrievalHTML+=`<div class='chunk ${i===0?"highlight":""}">Score: ${r.score.toFixed(2)} | ${r.text}</div>`
})

document.getElementById("retrieval").innerHTML=retrievalHTML

let context=scored[0].text

document.getElementById("context").innerHTML=
"<b>Step 6: Context sent to LLM</b><br>"+context

let answer=
"Using retrieved context: "+context+"<br><br>"+
"Answer: RAG improves LLM responses by retrieving relevant external knowledge and using it as context."

document.getElementById("answer").innerHTML=
"<b>Step 7: Final LLM Answer</b><br>"+answer

}

</script>

</body>
</html>
