<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Simulator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
    

    header {
      padding: 20px;
      text-align: center;
      background: #1e293b;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    textarea, input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      margin-top: 10px;
      background: #0f172a;
      color: white;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .step {
      margin-top: 10px;
      padding: 10px;
      background: #0f172a;
      border-radius: 8px;
    }

    .highlight {
      color: #38bdf8;
    }

    .full {
      grid-column: span 2;
    }
  </style>
</head>
<body>

<header>RAG Simulator (Learn by Doing)</header>

<div class="container">

  <div class="card">
    <h3>1. Knowledge Base</h3>
    <textarea id="kb" rows="6" placeholder="Enter documents (one per line)"></textarea>
    <button onclick="chunkData()">Chunk Data</button>
    <div id="chunks" class="step"></div>
  </div>

  <div class="card">
    <h3>2. Embeddings (Simulated)</h3>
    <button onclick="embedData()">Create Embeddings</button>
    <div id="embeddings" class="step"></div>
  </div>

  <div class="card">
    <h3>3. User Query</h3>
    <input id="query" placeholder="Ask something..." />
    <button onclick="search()">Retrieve Relevant Chunks</button>
    <div id="results" class="step"></div>
  </div>

  <div class="card">
    <h3>4. Augmented Context</h3>
    <button onclick="augment()">Build Context</button>
    <div id="context" class="step"></div>
  </div>

  <div class="card full">
    <h3>5. Generation (Simulated LLM)</h3>
    <button onclick="generate()">Generate Answer</button>
    <div id="output" class="step"></div>
  </div>

</div>

<script>
  let chunks = [];
  let embeddings = [];
  let retrieved = [];

  function chunkData() {
    const kb = document.getElementById("kb").value.split("\n");
    chunks = kb.map((text, i) => ({ id: i, text }));

    document.getElementById("chunks").innerHTML = chunks
      .map(c => `<div>${c.id}: ${c.text}</div>`)
      .join("");
  }

  function fakeEmbedding(text) {
    return text.toLowerCase().split(" ");
  }

  function embedData() {
    embeddings = chunks.map(c => ({
      ...c,
      vector: fakeEmbedding(c.text)
    }));

    document.getElementById("embeddings").innerHTML = embeddings
      .map(e => `<div>${e.id}: [${e.vector.join(", ")}]</div>`)
      .join("");
  }

  function similarity(a, b) {
    let score = 0;
    a.forEach(word => {
      if (b.includes(word)) score++;
    });
    return score;
  }

  function search() {
    const query = document.getElementById("query").value;
    const qVec = fakeEmbedding(query);

    retrieved = embeddings
      .map(e => ({
        ...e,
        score: similarity(qVec, e.vector)
      }))
      .sort((a, b) => b.score - a.score)
      .slice(0, 3);

    document.getElementById("results").innerHTML = retrieved
      .map(r => `<div class="highlight">${r.text} (score: ${r.score})</div>`)
      .join("");
  }

  function augment() {
    const context = retrieved.map(r => r.text).join(" ");
    document.getElementById("context").innerText = context;
  }

  function generate() {
    const query = document.getElementById("query").value;
    const context = document.getElementById("context").innerText;

    const output = `Answer based on retrieved context:\n\nQ: ${query}\n\nContext: ${context}\n\nA: This answer is generated using the above context. (Simulated)`;

    document.getElementById("output").innerText = output;
  }
</script>

</body>
</html>
