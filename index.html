<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Simulator For Beginners</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Inter', sans-serif;
  margin: 0;
  background: linear-gradient(135deg, #020617, #0f172a);
  color: #e2e8f0;
}
.container { max-width: 1100px; margin: auto; padding: 20px; }
h1 { text-align:center; }
.subtitle { text-align:center; color:#94a3b8; margin-bottom:20px; }
.card {
  background:#1e293b; padding:20px; border-radius:16px;
  margin-bottom:20px; box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
textarea, input, select, button {
  width:100%; margin-top:10px; padding:12px;
  border-radius:10px; border:none;
}
button { background:#38bdf8; font-weight:600; cursor:pointer; }
button:hover { transform:scale(1.03); }
.output { margin-top:10px; background:#020617; padding:12px; border-radius:10px; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:15px; }
.highlight { background:#065f46; padding:5px; border-radius:6px; }
.bad { background:#7f1d1d; padding:5px; border-radius:6px; }
.small { font-size:12px; color:#94a3b8; }
.badge { display:inline-block; padding:4px 8px; border-radius:6px; margin-top:5px; }
.good { background:#065f46; }
.poor { background:#7f1d1d; }
</style>
</head>
<body>
<div class="container">
<h1>🧠 RAG Playground</h1>
<div class="subtitle">Compare RAG vs No-RAG and learn why retrieval matters</div>

<div class="card">
<h2>1. Input Knowledge</h2>
<textarea id="textInput" placeholder="Paste ~100 words..."></textarea>
<select id="chunkSize">
<option value="3">3 chunks</option>
<option value="5">5 chunks</option>
<option value="10">10 chunks</option>
</select>
<button onclick="prepareData()">Prepare Knowledge Base</button>
<div id="chunkOut" class="output"></div>
</div>

<div class="card">
<h2>2. Ask Question</h2>
<input id="queryInput" placeholder="Ask a question">
<button onclick="runSimulation()">Run Comparison</button>
</div>

<div class="card grid">
<div>
<h3>❌ Without RAG</h3>
<div id="noRag" class="output"></div>
</div>
<div>
<h3>✅ With RAG</h3>
<div id="rag" class="output"></div>
</div>
</div>

<div class="card">
<h2>🔍 Retrieval Insights</h2>
<div id="insights" class="output"></div>
</div>

<div class="card">
<h2>📊 PM Metrics</h2>
<div id="metrics" class="output"></div>
</div>

</div>

<script>
let chunks=[], embeddings=[];

function fakeEmbedding(t){ return t.toLowerCase().split(' ').map(w=>w.charCodeAt(0)%7); }

function cosine(a,b){
  let d=0,ma=0,mb=0;
  for(let i=0;i<Math.min(a.length,b.length);i++){
    d+=a[i]*b[i]; ma+=a[i]*a[i]; mb+=b[i]*b[i];
  }
  return d/(Math.sqrt(ma)*Math.sqrt(mb)||1);
}

function prepareData(){
  const text=document.getElementById('textInput').value;
  const count=parseInt(document.getElementById('chunkSize').value);
  const words=text.split(' ');
  const size=Math.ceil(words.length/count);
  chunks=[];

  for(let i=0;i<count;i++){
    chunks.push(words.slice(i*size,(i+1)*size).join(' '));
  }

  embeddings=chunks.map(c=>fakeEmbedding(c));

  document.getElementById('chunkOut').innerHTML=
    chunks.map((c,i)=>`<div><b>Chunk ${i+1}:</b> ${c}</div>`).join('');
}

function highlightMatch(chunk, query){
  const words=query.toLowerCase().split(' ');
  let result=chunk;
  words.forEach(w=>{
    if(w.length>3) result=result.replace(new RegExp(w,'gi'), `<span class='highlight'>${w}</span>`);
  });
  return result;
}

function runSimulation(){
  const query=document.getElementById('queryInput').value;
  const qEmb=fakeEmbedding(query);

  // No RAG
  document.getElementById('noRag').innerHTML=
    "Generic answer: This response may not use your data effectively.";

  // RAG
  let scores=embeddings.map((e,i)=>({i,score:cosine(qEmb,e)}));
  scores.sort((a,b)=>b.score-a.score);

  const top=chunks[scores[0].i];
  const highlighted=highlightMatch(top, query);

  document.getElementById('rag').innerHTML=
    `<div>${highlighted}</div>
     <div class='small'>Similarity: ${scores[0].score.toFixed(3)}</div>`;

  // Insights
  document.getElementById('insights').innerHTML=
    scores.slice(0,3).map(s=>
      `Chunk ${s.i+1}: ${s.score.toFixed(3)}`
    ).join('<br>') +
    `<br><br>Top chunk selected because it best matches query meaning.`;

  // Metrics
  const score=scores[0].score;
  document.getElementById('metrics').innerHTML=
    `<div>Latency: ${Math.floor(Math.random()*100+50)} ms</div>
     <div>Cost: $0.002/query</div>
     <div>Accuracy: ${(score*100).toFixed(1)}%</div>
     <div class='badge ${score>0.5?'good':'poor'}'>${score>0.5?'Good Retrieval':'Needs Improvement'}</div>`;
}
</script>

</body>
</html>
