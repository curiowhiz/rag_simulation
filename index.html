<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAG Simulator</title>
<style>

body{
font-family: Arial, sans-serif;
background:#0f172a;
color:white;
margin:0;
padding:0;
}

.container{
width:1100px;
margin:auto;
padding:30px;
}

h1{
text-align:center;
margin-bottom:30px;
}

.pipeline{
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
width:300px;
min-height:180px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.card h3{
margin-top:0;
color:#38bdf8;
}

textarea{
width:100%;
height:90px;
border-radius:6px;
border:none;
padding:8px;
}

input{
width:100%;
padding:10px;
border-radius:6px;
border:none;
margin-top:5px;
}

button{
margin-top:10px;
padding:10px;
width:100%;
border:none;
border-radius:6px;
background:#38bdf8;
color:black;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

.output{
margin-top:10px;
background:#0f172a;
padding:10px;
border-radius:6px;
font-size:14px;
max-height:120px;
overflow:auto;
}

.step{
margin-top:30px;
text-align:center;
font-size:14px;
color:#94a3b8;
}

</style>
</head>

<body>

<div class="container">

<h1>RAG Simulator</h1>

<div class="pipeline">

<div class="card">
<h3>1. Knowledge Base</h3>
<textarea id="docs">
RAG helps reduce hallucinations in AI.
Vector databases store embeddings.
Embeddings convert text to numbers.
Chunking splits large documents.
Similarity search retrieves relevant data.
</textarea>
<button onclick="chunkDocs()">Chunk Documents</button>
<div class="output" id="chunks"></div>
</div>


<div class="card">
<h3>2. Embeddings</h3>
<button onclick="createEmbeddings()">Generate Embeddings</button>
<div class="output" id="embeddings"></div>
</div>


<div class="card">
<h3>3. Vector Database</h3>
<button onclick="storeVectors()">Store in Vector DB</button>
<div class="output" id="vectordb"></div>
</div>


<div class="card">
<h3>4. User Query</h3>
<input id="query" placeholder="Ask a question"/>
<button onclick="embedQuery()">Embed Query</button>
<div class="output" id="queryVector"></div>
</div>


<div class="card">
<h3>5. Similarity Search</h3>
<button onclick="search()">Find Relevant Chunks</button>
<div class="output" id="results"></div>
</div>


<div class="card">
<h3>6. Augmented Prompt + LLM</h3>
<button onclick="generate()">Generate Answer</button>
<div class="output" id="answer"></div>
</div>

</div>

<div class="step">
This simulator approximates embeddings using simple numeric hashing to demonstrate the RAG concept.
</div>

</div>

<script>

let chunks=[]
let embeddings=[]
let vectordb=[]
let queryVector=[]

function chunkDocs(){

let text=document.getElementById("docs").value
chunks=text.split("\n")

document.getElementById("chunks").innerHTML=
chunks.map((c,i)=>`Chunk ${i+1}: ${c}`).join("<br>")
}


function fakeEmbedding(text){

let vec=[]
for(let i=0;i<5;i++){
vec.push((text.charCodeAt(i%text.length)%10)/10)
}

return vec
}


function createEmbeddings(){

embeddings=chunks.map(c=>({
text:c,
vector:fakeEmbedding(c)
}))

document.getElementById("embeddings").innerHTML=
embeddings.map(e=>`${e.text}<br>[${e.vector}]`).join("<br><br>")

}


function storeVectors(){

vectordb=[...embeddings]

document.getElementById("vectordb").innerHTML=
vectordb.map(v=>`Stored: ${v.text}`).join("<br>")
}


function embedQuery(){

let q=document.getElementById("query").value

queryVector=fakeEmbedding(q)

document.getElementById("queryVector").innerHTML=
`Query Vector:<br>[${queryVector}]`

}


function cosine(a,b){

let dot=0
let magA=0
let magB=0

for(let i=0;i<a.length;i++){
dot+=a[i]*b[i]
magA+=a[i]*a[i]
magB+=b[i]*b[i]
}

return dot/(Math.sqrt(magA)*Math.sqrt(magB))
}


function search(){

let scores=vectordb.map(v=>({
text:v.text,
score:cosine(queryVector,v.vector)
}))

scores.sort((a,b)=>b.score-a.score)

let top=scores.slice(0,2)

document.getElementById("results").innerHTML=
top.map(t=>`${t.text}<br>Similarity: ${t.score.toFixed(2)}`).join("<br><br>")

window.topContext=top.map(t=>t.text)
}


function generate(){

let query=document.getElementById("query").value

let context=window.topContext.join(" ")

let answer=`Using retrieved context: "${context}"<br><br>
Answer: The query "${query}" relates to this information from the knowledge base.`

document.getElementById("answer").innerHTML=answer

}

</script>

</body>
</html>
